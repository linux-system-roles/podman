---
# Resolve kube play path metadata for restart dependency maps.
# Input: __podman_restart_spec_item (one podman_kube_specs element)
# Output: __podman_kube_name, __podman_kube_file, __podman_spec_name,
#   __podman_kube_user, __podman_kube_rootless, __podman_kube_systemd_scope,
#   __podman_kube_xdg_runtime_dir, __podman_kube_activate_systemd_unit
- name: Parse kube yaml for restart map
  set_fact:
    __podman_kube_restart_str: "{{ __podman_restart_spec_item['kube_file_content']
      if 'kube_file_content' in __podman_restart_spec_item
      and not __podman_restart_spec_item['kube_file_content'] is mapping
      else __podman_restart_spec_item['kube_file_content'] | to_nice_yaml
      if 'kube_file_content' in __podman_restart_spec_item
      and __podman_restart_spec_item['kube_file_content'] is mapping
      else lookup('file', __podman_restart_spec_item['kube_file_src'])
      if 'kube_file_src' in __podman_restart_spec_item
      and __podman_restart_spec_item['kube_file_src'] is exists
      else none }}"

- name: Set kube restart path variables
  set_fact:
    __podman_kube_restart_yaml: "{{ __podman_kube_restart_str | from_yaml
      if __podman_kube_restart_str else none }}"
    __podman_kube_restart_file_field: "{{ __podman_restart_spec_item['kube_file']
      if 'kube_file' in __podman_restart_spec_item else none }}"
    __podman_kube_user: "{{ __podman_restart_spec_item['run_as_user'] |
      d(podman_run_as_user) }}"
    __podman_kube_systemd_unit_scope: "{{
      __podman_restart_spec_item['systemd_unit_scope'] |
      d(podman_systemd_unit_scope) }}"
    __podman_kube_activate_systemd_unit: "{{
      __podman_restart_spec_item['activate_systemd_unit'] |
      d(podman_activate_systemd_unit) }}"

- name: Get passwd entry for kube spec user
  getent:
    database: passwd
    key: "{{ __podman_kube_user }}"
    fail_key: false
  when: "'getent_passwd' not in ansible_facts or
    __podman_kube_user not in ansible_facts['getent_passwd']"

- name: Fail if kube spec user does not exist
  fail:
    msg: >
      The given podman user [{{ __podman_kube_user }}] does not exist -
      cannot continue
  when: not ansible_facts["getent_passwd"][__podman_kube_user]

- name: Set kube user scope variables for restart map
  set_fact:
    __podman_kube_name: "{{ __podman_kube_restart_yaml['metadata']['name']
      if __podman_kube_restart_yaml else none }}"
    __podman_kube_rootless: "{{ __podman_kube_user != 'root' }}"
    __podman_kube_xdg_runtime_dir: >-
      /run/user/{{ ansible_facts["getent_passwd"][__podman_kube_user][1] }}

- name: Set kube file path for restart map
  set_fact:
    __podman_kube_systemd_scope: "{{ __podman_kube_systemd_unit_scope
      if __podman_kube_systemd_unit_scope
      and __podman_kube_systemd_unit_scope | length > 0
      else __podman_kube_rootless | ternary('user', 'system') }}"
    __podman_kube_path: "{{ __podman_kube_user_home ~
      __podman_user_kube_path
      if __podman_kube_rootless else __podman_system_kube_path }}"
  vars:
    __podman_kube_user_home: "{{
      ansible_facts['getent_passwd'][__podman_kube_user][4] }}"

- name: Set kube file destination for restart map
  set_fact:
    __podman_kube_file: "{{ __podman_kube_restart_file_field
      if __podman_kube_restart_file_field and __podman_kube_restart_file_field is abs
      else __podman_kube_path ~ '/' ~ __podman_kube_restart_file_field
      if __podman_kube_restart_file_field
      else __podman_kube_path ~ '/' ~ __podman_kube_name ~ '.yml'
      if __podman_kube_name else '' }}"
    __podman_spec_name: "{{ __podman_kube_name }}"
