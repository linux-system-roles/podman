---
- name: Resolve kube paths for restart map
  include_tasks: kube_restart_paths.yml

- name: Get kube play service name using systemd-escape
  command: >-
    systemd-escape --template podman-kube@.service
    {{ __podman_kube_file | quote }}
  register: __podman_kube_restart_service_name
  changed_when: false
  when:
    - __podman_kube_file | length > 0
    - __podman_kube_activate_systemd_unit | bool

- name: Record kube play service for restart map
  set_fact:
    __podman_restart_services: "{{ __podman_restart_services +
      [__service_entry] }}"
  when:
    - __podman_restart_spec_item.get('state', '') != 'absent'
    - __podman_spec_name | length > 0
    - __podman_kube_activate_systemd_unit | bool
    - __podman_kube_restart_service_name.stdout | d("") | length > 0
  vars:
    __service_entry:
      unit_name: "{{ __podman_spec_name }}"
      service: "{{ __podman_kube_restart_service_name.stdout }}"
      user: "{{ __podman_kube_user }}"
      scope: "{{ __podman_kube_systemd_scope }}"
      activate_systemd_unit: "{{ __podman_kube_activate_systemd_unit }}"
      xdg_runtime_dir: "{{ __podman_kube_xdg_runtime_dir
        if __podman_kube_rootless else '' }}"
